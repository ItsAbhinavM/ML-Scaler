apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ml-scaler-monitor
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: ml-scaler
  endpoints:
    - port: http
      path: /metrics
      interval: 5s
  namespaceSelector:
    matchNames:
      - default
