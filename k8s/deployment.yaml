apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-scaler
  labels:
    app: ml-scaler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-scaler
  template:
    metadata:
      labels:
        app: ml-scaler
    spec:
      containers:
        - name: ml-scaler
          image: ml-scaler:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
