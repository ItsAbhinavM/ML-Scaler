apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-scaler
  labels:
    app: ml-scaler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-scaler
  template:
    metadata:
      labels:
        app: ml-scaler
    spec:
      containers:
        - name: ml-scaler
          image: ml-scaler:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "3Gi"
          # Startup probe: generous time for YOLO model download/load
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 30
            periodSeconds: 5
          # Liveness: use TCP socket — it just checks if the port is open
          # This prevents false kills when uvicorn is busy with inference
          livenessProbe:
            tcpSocket:
              port: 8000
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          # Readiness: HTTP GET — determines if pod can receive NEW traffic
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
